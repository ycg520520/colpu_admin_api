<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JWT密钥生成器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 600px;
      padding: 30px;
    }

    h1 {
      color: #2c3e50;
      margin-bottom: 20px;
      text-align: center;
    }

    .description {
      color: #7f8c8d;
      margin-bottom: 25px;
      line-height: 1.6;
      text-align: center;
    }

    .input-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #34495e;
      font-weight: 500;
    }

    input[type="number"] {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 16px;
    }

    .btn {
      background-color: #3498db;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      transition: background-color 0.3s;
      margin-bottom: 20px;
    }

    .btn:hover {
      background-color: #2980b9;
    }

    .result-container {
      position: relative;
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 5px;
      resize: none;
      font-family: monospace;
      font-size: 16px;
    }

    .copy-btn {
      position: absolute;
      right: 10px;
      bottom: 10px;
      background-color: rgba(52, 73, 94, 0.7);
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }

    .copy-btn:hover {
      background-color: rgba(52, 73, 94, 1);
    }

    .info-box {
      background-color: #f8f9fa;
      border-left: 4px solid #3498db;
      padding: 15px;
      margin-top: 20px;
      border-radius: 0 5px 5px 0;
    }

    .info-box h3 {
      color: #2c3e50;
      margin-bottom: 10px;
    }

    .info-box p {
      color: #7f8c8d;
      line-height: 1.5;
    }

    .strength-indicator {
      display: flex;
      margin-bottom: 20px;
    }

    .strength-section {
      flex: 1;
      height: 10px;
      margin: 0 2px;
      border-radius: 5px;
      background-color: #ecf0f1;
    }

    .active {
      background-color: #2ecc71;
    }

    .warning {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>JWT密钥生成器</h1>
    <p class="description">
      JWT(JSON Web Token)需要一个安全密钥进行签名和验证。此工具帮助您生成安全的随机密钥。
    </p>

    <div class="input-group">
      <label for="keyLength">密钥长度 (字节):</label>
      <input type="number" id="keyLength" min="32" max="1024" value="32">
      <p class="warning">注意：密钥长度至少应为16字节(256位)以保证安全性</p>
    </div>

    <div class="strength-indicator">
      <div class="strength-section"></div>
      <div class="strength-section"></div>
      <div class="strength-section"></div>
      <div class="strength-section"></div>
      <div class="strength-section"></div>
    </div>

    <button class="btn" id="generateBtn">生成密钥</button>

    <div class="result-container">
      <label for="secretKey">生成的密钥 (Base32编码):</label>
      <textarea id="secretKey" readonly placeholder="点击上方按钮生成密钥"></textarea>
      <button class="copy-btn" id="copyBtn">复制</button>
    </div>

    <div class="info-box">
      <h3>使用说明</h3>
      <p>1. 选择适当的密钥长度（推荐至少32字节）</p>
      <p>2. 点击"生成密钥"按钮</p>
      <p>3. 复制生成的密钥并在您的应用程序中使用</p>
      <p>4. 确保将密钥保存在安全的地方，不要泄露</p>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const generateBtn = document.getElementById('generateBtn');
      const copyBtn = document.getElementById('copyBtn');
      const keyLengthInput = document.getElementById('keyLength');
      const secretKeyTextarea = document.getElementById('secretKey');
      const strengthSections = document.querySelectorAll('.strength-section');

      // 更新强度指示器
      function updateStrengthIndicator() {
        const length = parseInt(keyLengthInput.value);
        let strength = 0;

        if (length >= 32) strength = 1;
        if (length >= 48) strength = 2;
        if (length >= 64) strength = 3;
        if (length >= 96) strength = 4;
        if (length >= 128) strength = 5;

        strengthSections.forEach((section, index) => {
          if (index < strength) {
            section.classList.add('active');
          } else {
            section.classList.remove('active');
          }
        });
      }

      // 初始更新强度指示器
      updateStrengthIndicator();

      // 监听密钥长度输入变化
      keyLengthInput.addEventListener('input', updateStrengthIndicator);

      // 生成随机密钥
      generateBtn.addEventListener('click', function () {
        const keyLength = parseInt(keyLengthInput.value);

        if (keyLength < 16) {
          alert('为了安全起见，密钥长度至少应为32字节');
          return;
        }

        // 使用Web Crypto API生成安全随机字节
        const randomBytes = new Uint8Array(keyLength);
        crypto.getRandomValues(randomBytes);

        const binaryString = Array.from(randomBytes, byte =>
          String.fromCharCode(byte)
        ).join('');
        // 转换为Base64字符串
        const base64Key = btoa(binaryString);

        console.log(randomBytes, base64Key);

        // 显示生成的密钥
        secretKeyTextarea.value = base64Key;
      });

      // 复制密钥到剪贴板
      copyBtn.addEventListener('click', function () {
        if (!secretKeyTextarea.value) {
          alert('请先生成密钥');
          return;
        }

        secretKeyTextarea.select();
        document.execCommand('copy');

        // 显示复制成功反馈
        const originalText = copyBtn.textContent;
        copyBtn.textContent = '已复制!';

        setTimeout(() => {
          copyBtn.textContent = originalText;
        }, 2000);
      });
    });
  </script>
</body>

</html>
